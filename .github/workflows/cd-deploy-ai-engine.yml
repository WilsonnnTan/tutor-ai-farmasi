name: CD - Deploy AI Engine to Vercel
run-name: AI Engine Deployment on commit ${{ github.sha }} by @${{ github.actor }}

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_AI_ENGINE_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_AI_ENGINE_PROJECT_ID }}

on:
  push:
    branches: ['main']

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ai_engine
    
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: '22.18'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install uv
        run: |
          pip install uv

      - name: Install Vercel CLI
        run: npm install --global vercel

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      
      - name: Build Project Artifact
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifact
        run: >- 
            vercel deploy 
            --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}