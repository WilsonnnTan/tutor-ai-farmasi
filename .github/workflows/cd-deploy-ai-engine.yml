name: CD - Deploy AI Engine to Vercel
run-name: AI Engine Deployment on commit ${{ github.sha }} by @${{ github.actor }}

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_AI_ENGINE_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_AI_ENGINE_PROJECT_ID }}

on:
  push:
    branches: ["main"]

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ai_engine

    steps:
      - name: Checkout branch
        uses: actions/checkout@v6

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: "22.18"

      - name: Install Vercel CLI
        run: npm install --global vercel

      - name: Deploy Project Artifact
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
