name: Web App Vercel Preview Deployment
run-name: Web App Deployment on commit ${{ github.sha }} by @${{ github.actor }}

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_WEBAPP_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WEBAPP_PROJECT_ID }}

on:
  workflow_run:
    workflows: ['CI - Web App']
    types: [completed]
    branches-ignore: [main]

jobs:
  deploy-preview:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web_app
    
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6

      - name: Install Vercel CLI
        run: npm install --global vercel

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
      
      - name: Build Project Artifact
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifact
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}